version: '3.9'

services:
  localstack:
    image: localstack/localstack:3
    container_name: racephotos-localstack
    ports:
      - '4566:4566' # LocalStack gateway — all AWS services on one port
    environment:
      - SERVICES=s3,dynamodb,sqs,cognito-idp,ses,lambda,apigateway,iam
      - DEFAULT_REGION=us-east-1
      - PERSISTENCE=1 # keep state across restarts (stored in ./volume)
      - DEBUG=${LOCALSTACK_DEBUG:-0}
    volumes:
      - './volume:/var/lib/localstack'
      - '/var/run/docker.sock:/var/run/docker.sock'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4566/_localstack/health']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
