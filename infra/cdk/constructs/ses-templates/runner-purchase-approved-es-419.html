<html>
<body style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;padding:20px">
  <h2>Tu Foto Está Lista</h2>
  <p>Tu pago fue aprobado. Ya puedes descargar tu foto.</p>
  <table style="border-collapse:collapse;width:100%;margin-bottom:24px">
    <tr>
      <td style="padding:8px;font-weight:bold">Evento</td>
      <td style="padding:8px">{{eventName}}</td>
    </tr>
  </table>
  <p>
    <!-- downloadUrl must be the permanent platform route /download/{downloadToken},
         never a short-lived S3 presigned URL. The token does not expire. -->
    <a href="{{downloadUrl}}"
       style="background:#1a73e8;color:#fff;padding:12px 24px;text-decoration:none;border-radius:4px;display:inline-block">
      Descargar foto
    </a>
  </p>
  <p style="color:#666;font-size:13px;margin-top:16px">
    Este enlace funciona indefinidamente. Márcalo como favorito o guarda este correo.
    Si lo pierdes, visita la plataforma y usa la opción de re-descarga.
  </p>
</body>
</html>
