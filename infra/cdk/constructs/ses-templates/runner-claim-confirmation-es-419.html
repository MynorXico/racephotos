<html>
<body style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;padding:20px">
  <h2>Solicitud de Pago Recibida</h2>
  <p>Recibimos tu solicitud de pago. El fotógrafo la verificará y aprobará.</p>
  <table style="border-collapse:collapse;width:100%">
    <tr>
      <td style="padding:8px;font-weight:bold">Evento</td>
      <td style="padding:8px">{{eventName}}</td>
    </tr>
    <tr>
      <td style="padding:8px;font-weight:bold">Referencia de foto</td>
      <td style="padding:8px">{{photoReference}}</td>
    </tr>
    <tr>
      <td style="padding:8px;font-weight:bold">Tu referencia de pago</td>
      <td style="padding:8px"><strong>{{paymentReference}}</strong></td>
    </tr>
  </table>
  <p style="margin-top:16px">
    Guarda tu referencia de pago. Recibirás otro correo cuando el fotógrafo apruebe tu solicitud.
  </p>
</body>
</html>
