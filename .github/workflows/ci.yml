name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Backend: Go unit tests + lint
  # Runs even when no Lambdas exist yet (skips gracefully)
  # ──────────────────────────────────────────────
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b $(go env GOPATH)/bin v1.62.2

      - name: Unit tests
        run: make test-unit

      - name: Lint
        run: make lint

  # ──────────────────────────────────────────────
  # Infrastructure: CDK type-check + unit tests
  #
  # We do NOT run `cdk synth` in CI. The pipeline stack resolves all config
  # via SSM valueFromLookup, which requires real AWS credentials and cached
  # context — neither available in CI without secrets. Instead we:
  #   1. tsc --noEmit: validates all TypeScript types across constructs/stacks
  #   2. jest: validates construct logic via CDK assertions (no AWS calls)
  # Run `make synth` locally with real credentials to verify deploy readiness.
  # ──────────────────────────────────────────────
  infrastructure:
    name: Infrastructure (CDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: infra/cdk/package-lock.json

      - name: Install CDK dependencies
        run: cd infra/cdk && npm ci

      - name: TypeScript type-check
        run: cd infra/cdk && npx tsc --noEmit

      - name: CDK unit tests
        run: cd infra/cdk && npm test

  # ──────────────────────────────────────────────
  # Frontend: build + unit tests + E2E
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/angular/package-lock.json

      - name: Install dependencies
        run: cd frontend/angular && npm ci

      - name: Lint (ESLint)
        run: make ng-lint

      - name: Production build
        run: make ng-build

      - name: Unit tests
        run: cd frontend/angular && npx ng test --watch=false --code-coverage --browsers=ChromeHeadlessNoSandbox

      - name: Install Playwright browsers
        run: cd frontend/angular && npx playwright install chromium --with-deps

      - name: E2E tests
        run: make e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/angular/playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Storybook: verify all stories build
  # ──────────────────────────────────────────────
  storybook:
    name: Storybook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/angular/package-lock.json

      - name: Install dependencies
        run: cd frontend/angular && npm ci

      - name: Build Storybook
        # Must use the Angular builder — `npx storybook build` is the legacy path
        run: cd frontend/angular && npm run storybook:build
