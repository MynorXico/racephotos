name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Backend: Go unit tests + lint
  # Runs even when no Lambdas exist yet (skips gracefully)
  # ──────────────────────────────────────────────
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b $(go env GOPATH)/bin v1.62.2

      - name: Unit tests
        run: make test-unit

      - name: Lint
        run: make lint

  # ──────────────────────────────────────────────
  # Infrastructure: CDK synth
  # ──────────────────────────────────────────────
  infrastructure:
    name: Infrastructure (CDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: infra/cdk/package-lock.json

      - name: Install CDK dependencies
        run: cd infra/cdk && npm ci

      - name: CDK synth
        # --no-lookups prevents CDK from making AWS API calls (SSM/context lookups).
        # This validates construct logic and type correctness without needing credentials.
        run: make synth
        env:
          CDK_DEFAULT_ACCOUNT: '000000000000'
          CDK_DEFAULT_REGION: 'us-east-1'

  # ──────────────────────────────────────────────
  # Frontend: build + unit tests + E2E
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/angular/package-lock.json

      - name: Install dependencies
        run: cd frontend/angular && npm ci

      - name: Production build
        run: make ng-build

      - name: Unit tests
        run: cd frontend/angular && npx ng test --watch=false --code-coverage --browsers=ChromeHeadlessNoSandbox

      - name: Install Playwright browsers
        run: cd frontend/angular && npx playwright install chromium --with-deps

      - name: E2E tests
        run: make e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/angular/playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Storybook: verify all stories build
  # ──────────────────────────────────────────────
  storybook:
    name: Storybook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/angular/package-lock.json

      - name: Install dependencies
        run: cd frontend/angular && npm ci

      - name: Build Storybook
        # Must use the Angular builder — `npx storybook build` is the legacy path
        run: cd frontend/angular && npm run storybook:build
