@if (cartCount() > 0) {
  <div class="selection-toolbar" role="toolbar" aria-label="Photo selection toolbar">
    <span class="selection-summary" aria-live="polite">
      <strong>{{ cartCount() }} photo(s)</strong> selected
    </span>
    <button
      mat-flat-button
      color="primary"
      class="purchase-btn"
      (click)="onPurchase()"
    >
      Purchase ({{ cartCount() }} photos)
    </button>
  </div>
}

<div
  class="photo-grid"
  role="list"
  [attr.aria-label]="searchedBib ? 'Photos for bib ' + searchedBib : 'Search results'"
>
  @for (photo of photos; track photo.photoId) {
    <app-runner-photo-card
      [photo]="photo"
      [pricePerPhoto]="pricePerPhoto"
      [currency]="currency"
      [eventId]="eventId"
      [eventName]="eventName"
      [searchedBib]="searchedBib"
      (photoSelected)="photoSelected.emit($event)"
    />
  }
</div>
