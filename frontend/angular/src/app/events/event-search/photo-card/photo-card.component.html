<mat-card appearance="outlined" class="runner-photo-card" [class.is-selected]="isInCart()">
  <div class="thumbnail-container">
    <!-- Checkbox overlay -->
    <div class="checkbox-wrapper" role="presentation" [class.always-visible]="isInCart()">
      <mat-checkbox
        [checked]="isInCart()"
        [disabled]="checkboxDisabled()"
        [attr.aria-label]="checkboxAriaLabel"
        [matTooltip]="tooltipText"
        matTooltipTouchGestures="on"
        (click)="$event.stopPropagation()"
        (change)="onCheckboxChange($event)"
      />
    </div>

    @if (!imageError()) {
      <img
        [src]="photo.watermarkedUrl"
        [alt]="altText"
        class="thumbnail-img"
        (error)="onImageError()"
      />
    } @else {
      <div class="thumbnail-placeholder" aria-label="Photo unavailable">
        <mat-icon class="placeholder-icon">broken_image</mat-icon>
      </div>
    }
  </div>

  <mat-card-footer class="card-footer">
    <span class="event-name-label">{{ eventName }}</span>
  </mat-card-footer>
</mat-card>

<!-- Cross-event confirmation dialog (inline template — no separate component file) -->
<ng-template #crossEventConfirm let-dialogRef>
  <h2 mat-dialog-title>Start a new cart?</h2>
  <mat-dialog-content>
    <p>
      Your cart contains photos from another event. Starting a new cart will remove
      <strong>{{ cartCount() }} photo(s)</strong>. Continue?
    </p>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button
      mat-stroked-button
      cdkFocusInitial
      [mat-dialog-close]="false"
    >Cancel</button>
    <button
      mat-flat-button
      color="primary"
      [mat-dialog-close]="true"
    >Continue</button>
  </mat-dialog-actions>
</ng-template>
